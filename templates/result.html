<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carso - Prediction Result</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(20, 22, 28, 0.85);
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --accent: #00e0ff;
            --accent-2: #ff0077;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
        }

        header nav a {
            color: var(--text-primary);
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        main {
            padding: 60px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }

        .result-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }

        .result-section h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .result-section p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin: 15px 0;
        }

        #price-result {
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent-2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Car Animation */
        .car-animation {
            position: absolute;
            bottom: -100px; /* Start off-screen */
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: var(--accent);
            border-radius: 20px 20px 10px 10px;
            animation: driveIn 3s ease-in-out forwards;
        }

        .car-animation::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 160px;
            height: 60px;
            background: var(--bg-color);
            border-radius: 10px;
        }

        .wheel {
            position: absolute;
            bottom: -10px;
            width: 40px;
            height: 40px;
            background: var(--bg-color);
            border-radius: 50%;
        }

        .wheel::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
        }

        .wheel-left { left: 20px; }
        .wheel-right { right: 20px; }

        @keyframes driveIn {
            0% { transform: translateX(-150%) translateY(-100px) scale(0.5); }
            50% { transform: translateX(-50%) translateY(-100px) scale(1); }
            100% { transform: translateX(-50%) translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Carso</h1>
            <nav>
                <a href="/">Home</a>
                <a href="/contact">Contact Us</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="result-section">
                <h2>Car Price Prediction</h2>
                <p>Your car's predicted price is:</p>
                <p id="price-result">{{ car_price }}</p>
                <div class="car-animation">
                    <div class="wheel wheel-left"></div>
                    <div class="wheel wheel-right"></div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
